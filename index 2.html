<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meu Treino" />
  <meta name="theme-color" content="#0d0d1a" />
  <title>Meu Treino</title>

  <!-- Inline manifest via JS (no extra file needed) -->
  <script>
  (function() {
    const ICON192 = "ICON192_PLACEHOLDER";
    const ICON512 = "ICON512_PLACEHOLDER";
    const manifest = {
      name: "Meu Treino", short_name: "Treino",
      start_url: "./", display: "standalone",
      background_color: "#0d0d1a", theme_color: "#0d0d1a",
      icons: [
        { src: "data:image/png;base64," + ICON192, sizes: "192x192", type: "image/png" },
        { src: "data:image/png;base64," + ICON512, sizes: "512x512", type: "image/png" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const link = document.createElement("link");
    link.rel = "manifest"; link.href = url;
    document.head.appendChild(link);

    // Apple touch icon
    const iconLink = document.createElement("link");
    iconLink.rel = "apple-touch-icon";
    iconLink.href = "data:image/png;base64," + ICON192;
    document.head.appendChild(iconLink);
  })();
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0d0d1a; --card: #1a1a2e;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0; --muted: #777;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100vh; overscroll-behavior: none;
    }
    #topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,26,0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: calc(var(--safe-top) + 14px) 16px 0;
    }
    #topbar-title { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
    #topbar-title span { font-size:17px; font-weight:800; letter-spacing:-0.3px; }
    #tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; }
    #tabs::-webkit-scrollbar { display:none; }
    .tab-btn {
      flex-shrink:0; background:transparent;
      border:1px solid rgba(255,255,255,0.1); border-bottom:none;
      border-radius:8px 8px 0 0; color:var(--muted);
      cursor:pointer; padding:8px 16px 10px;
      font-size:12px; font-weight:700; font-family:inherit;
      display:flex; flex-direction:column; align-items:center; gap:3px;
      transition:all 0.15s; -webkit-font-smoothing:antialiased;
    }
    .tab-btn.active { border-color:transparent; color:#fff; }
    .tab-pct { font-size:9px; font-weight:700; opacity:0.85; }
    #content { max-width:540px; margin:0 auto; padding:20px 16px calc(var(--safe-bottom) + 32px); }
    .day-header { border-radius:16px; padding:20px 20px 16px; margin-bottom:24px; border:1px solid; }
    .day-eyebrow { font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
    .day-title { font-size:20px; font-weight:800; line-height:1.2; }
    .day-note {
      display:inline-flex; align-items:center; gap:5px; margin-top:10px;
      background:rgba(255,255,255,0.06); border-radius:20px;
      padding:3px 10px; font-size:11px; color:#aaa;
    }
    .group-block { margin-bottom:24px; }
    .group-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .group-line-l { height:1px; width:16px; opacity:0.6; }
    .group-name { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:#888; }
    .group-line-r { height:1px; flex:1; background:rgba(255,255,255,0.06); }
    .ex-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:12px; padding:14px 16px; margin-bottom:10px; transition:border-color 0.2s;
    }
    .ex-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
    .ex-name { font-weight:700; font-size:14px; color:#f0f0f0; line-height:1.3; flex:1; }
    .ex-meta { font-size:11px; color:var(--muted); margin-top:3px; }
    .ex-actions { display:flex; gap:6px; margin-left:8px; align-items:center; flex-shrink:0; }
    .badge { font-size:10px; border-radius:20px; padding:2px 8px; font-weight:700; }
    .edit-btn {
      background:rgba(255,255,255,0.06); border:none; border-radius:6px;
      color:#aaa; cursor:pointer; padding:5px 10px;
      font-size:11px; font-weight:700; font-family:inherit;
      display:flex; align-items:center; gap:4px; transition:all 0.15s; white-space:nowrap;
    }
    .series-row {
      display:flex; align-items:center; gap:8px;
      padding:6px 10px; border-radius:8px;
      background:rgba(255,255,255,0.04); margin-bottom:4px;
    }
    .series-lbl { font-size:11px; font-weight:700; min-width:22px; text-align:center; opacity:0.9; letter-spacing:0.5px; }
    .series-fields { flex:1; display:flex; gap:6px; }
    .field-wrap { flex:1; }
    .field-label { font-size:9px; color:#666; margin-bottom:2px; text-transform:uppercase; letter-spacing:0.5px; }
    .field-input {
      width:100%; background:rgba(255,255,255,0.07);
      border-radius:6px; color:#fff; font-size:14px; font-weight:600;
      padding:5px 8px; outline:none; font-family:inherit;
      -webkit-appearance:none; appearance:none;
    }
    .field-val { font-size:14px; font-weight:700; padding:5px 0; }
    .field-empty { color:#444; }
    #toast {
      position:fixed; bottom:calc(var(--safe-bottom) + 24px);
      left:50%; transform:translateX(-50%) translateY(80px);
      background:#1e1e35; border:1px solid rgba(255,255,255,0.12);
      color:#fff; padding:10px 20px; border-radius:24px;
      font-size:13px; font-weight:600; z-index:999;
      transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events:none; white-space:nowrap;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="topbar">
  <div id="topbar-title">
    <svg id="title-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 5v14M18 5v14M6 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h3M18 8h3a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1h-3M6 5h12"/>
    </svg>
    <span>Meu Treino</span>
  </div>
  <div id="tabs"></div>
</div>

<div id="content"></div>
<div id="toast"></div>

<script>
const STORAGE_KEY = "jardel_treino_v1";

const DAYS = [
  { key:"segunda", label:"Segunda", theme:"#6C63FF", tag:"COSTAS + BÍCEPS", nota:null,
    grupos:[
      { nome:"Costas", priority:false, exercicios:[
        {id:"s1",nome:"Barra fixa pronada",series:4,reps:"6–10"},
        {id:"s2",nome:"Puxada alta aberta",series:4,reps:"8–12"},
        {id:"s3",nome:"Pulldown unilateral",series:3,reps:"10–12"},
        {id:"s4",nome:"Remada articulada neutra",series:3,reps:"8–12"},
        {id:"s5",nome:"Pullover na polia",series:3,reps:"12–15"},
      ]},
      { nome:"Bíceps", priority:false, exercicios:[
        {id:"s6",nome:"Rosca direta",series:3,reps:"8–12"},
        {id:"s7",nome:"Rosca inclinada",series:3,reps:"10–12"},
      ]},
      { nome:"Abdômen", priority:false, exercicios:[
        {id:"s8",nome:"Elevação de pernas",series:3,reps:"12–15"},
      ]},
    ]
  },
  { key:"terca", label:"Terça", theme:"#E85D75", tag:"PEITO + OMBRO + TRÍCEPS", nota:"Corrida no mesmo dia",
    grupos:[
      { nome:"Peito", priority:false, exercicios:[
        {id:"t1",nome:"Supino inclinado",series:4,reps:"6–10"},
        {id:"t2",nome:"Supino reto",series:3,reps:"8–12"},
        {id:"t3",nome:"Crucifixo inclinado",series:3,reps:"10–15"},
      ]},
      { nome:"Ombros", priority:false, exercicios:[
        {id:"t4",nome:"Desenvolvimento sentado",series:3,reps:"8–12"},
        {id:"t5",nome:"Elevação lateral",series:4,reps:"12–15"},
        {id:"t6",nome:"Elev. lateral unilateral polia",series:3,reps:"12–15"},
      ]},
      { nome:"Tríceps", priority:false, exercicios:[
        {id:"t7",nome:"Tríceps corda",series:3,reps:"10–15"},
        {id:"t8",nome:"Tríceps francês",series:3,reps:"10–12"},
      ]},
    ]
  },
  { key:"quarta", label:"Quarta", theme:"#F59E0B", tag:"LOWER A — QUADRÍCEPS", nota:null,
    grupos:[
      { nome:"Pernas", priority:false, exercicios:[
        {id:"q1",nome:"Agachamento livre",series:4,reps:"6–10"},
        {id:"q2",nome:"Leg Press",series:4,reps:"10–15"},
        {id:"q3",nome:"Hack Squat",series:3,reps:"10–12"},
        {id:"q4",nome:"Cadeira extensora",series:3,reps:"12–15"},
        {id:"q5",nome:"Panturrilha em pé",series:4,reps:"12–20"},
        {id:"q6",nome:"Panturrilha sentado",series:3,reps:"12–20"},
      ]},
      { nome:"Core", priority:false, exercicios:[
        {id:"q7",nome:"Prancha",series:3,reps:"—"},
      ]},
    ]
  },
  { key:"sexta", label:"Sexta", theme:"#10B981", tag:"UPPER ESTÉTICO", nota:"Corrida no mesmo dia",
    grupos:[
      { nome:"Costas", priority:false, exercicios:[
        {id:"x1",nome:"Barra fixa",series:3,reps:"falha técnica"},
        {id:"x2",nome:"Puxada neutra",series:3,reps:"8–12"},
      ]},
      { nome:"Peito Superior", priority:false, exercicios:[
        {id:"x3",nome:"Supino inclinado halteres",series:3,reps:"8–12"},
      ]},
      { nome:"Ombros", priority:true, exercicios:[
        {id:"x4",nome:"Elevação lateral",series:5,reps:"12–15"},
        {id:"x5",nome:"Elevação lateral parcial",series:2,reps:"20"},
        {id:"x6",nome:"Crucifixo inverso",series:4,reps:"12–15"},
      ]},
      { nome:"Braços", priority:false, exercicios:[
        {id:"x7",nome:"Rosca martelo",series:3,reps:"10–12"},
        {id:"x8",nome:"Tríceps corda",series:3,reps:"10–12"},
      ]},
      { nome:"Abdômen", priority:false, exercicios:[
        {id:"x9",nome:"Crunch máquina ou polia",series:4,reps:"12–15"},
      ]},
    ]
  },
  { key:"sabado", label:"Sábado", theme:"#8B5CF6", tag:"LOWER B — POSTERIOR + GLÚTEO", nota:null,
    grupos:[
      { nome:"Posterior", priority:false, exercicios:[
        {id:"b1",nome:"Stiff",series:4,reps:"8–12"},
        {id:"b2",nome:"Mesa flexora",series:4,reps:"10–15"},
        {id:"b3",nome:"Terra romeno",series:3,reps:"8–10"},
        {id:"b4",nome:"Afundo caminhando",series:3,reps:"10 p/ perna"},
        {id:"b5",nome:"Cadeira abdutora",series:3,reps:"15–20"},
        {id:"b6",nome:"Panturrilha leg press",series:4,reps:"15–20"},
      ]},
      { nome:"Core", priority:false, exercicios:[
        {id:"b7",nome:"Abdominal infra",series:3,reps:"15"},
      ]},
    ]
  },
];

let activeDay = "segunda";
let editing = {};
let data = loadData();

function buildDefault(day) {
  const r = {};
  day.grupos.forEach(g => g.exercicios.forEach(ex => {
    r[ex.id] = Array.from({length:ex.series}, ()=>({peso:"",reps:""}));
  }));
  return r;
}

function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    const stored = s ? JSON.parse(s) : {};
    const r = {};
    DAYS.forEach(d => r[d.key] = stored[d.key] || buildDefault(d));
    return r;
  } catch { const r={}; DAYS.forEach(d=>r[d.key]=buildDefault(d)); return r; }
}

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function dayPct(key) {
  const day = DAYS.find(d=>d.key===key);
  let total=0,filled=0;
  day.grupos.forEach(g=>g.exercicios.forEach(ex=>{
    (data[key][ex.id]||[]).forEach(s=>{total++;if(s.peso||s.reps)filled++;});
  }));
  return total ? Math.round(filled/total*100) : 0;
}

let toastTimer;
function toast(msg) {
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),1800);
}

function renderTabs() {
  const el=document.getElementById("tabs"); el.innerHTML="";
  const icon=document.getElementById("title-icon");
  const activeTheme=DAYS.find(d=>d.key===activeDay).theme;
  icon.setAttribute("stroke",activeTheme);
  DAYS.forEach(d=>{
    const pct=dayPct(d.key), isActive=d.key===activeDay;
    const btn=document.createElement("button");
    btn.className="tab-btn"+(isActive?" active":"");
    btn.style.background=isActive?d.theme:"transparent";
    btn.innerHTML=d.label+(pct>0?`<span class="tab-pct" style="color:${isActive?"rgba(255,255,255,0.8)":d.theme}">${pct}%</span>`:"");
    btn.onclick=()=>{ activeDay=d.key; editing={}; render(); };
    el.appendChild(btn);
  });
}

function renderContent() {
  const day=DAYS.find(d=>d.key===activeDay);
  const el=document.getElementById("content"); el.innerHTML="";

  // Header
  const hdr=document.createElement("div");
  hdr.className="day-header";
  hdr.style.background=`linear-gradient(135deg,${day.theme}22 0%,transparent 100%)`;
  hdr.style.borderColor=`${day.theme}33`;
  hdr.innerHTML=`<div class="day-eyebrow" style="color:${day.theme}">${day.label}</div>
    <div class="day-title">${day.tag}</div>
    ${day.nota?`<div class="day-note">🏃 ${day.nota}</div>`:""}`;
  el.appendChild(hdr);

  day.grupos.forEach(grupo=>{
    const block=document.createElement("div"); block.className="group-block";
    const gh=document.createElement("div"); gh.className="group-header";
    gh.innerHTML=`<div class="group-line-l" style="background:${day.theme}"></div>
      <span class="group-name" style="${grupo.priority?`color:${day.theme}`:""}">
        ${grupo.nome}${grupo.priority?" ★":""}
      </span>
      <div class="group-line-r"></div>`;
    block.appendChild(gh);

    grupo.exercicios.forEach(ex=>{
      const seriesData=data[activeDay][ex.id]||Array.from({length:ex.series},()=>({peso:"",reps:""}));
      const filled=seriesData.filter(s=>s.peso||s.reps).length;
      const allFilled=filled===seriesData.length&&seriesData.every(s=>s.peso&&s.reps);
      const isEditing=!!editing[ex.id];

      const card=document.createElement("div");
      card.className="ex-card";
      if(allFilled) card.style.borderColor=day.theme+"55";

      // Head
      const head=document.createElement("div"); head.className="ex-head";
      const info=document.createElement("div");
      info.innerHTML=`<div class="ex-name">${ex.nome}</div><div class="ex-meta">${ex.series} séries · ${ex.reps} reps</div>`;
      const acts=document.createElement("div"); acts.className="ex-actions";

      if(filled>0){
        const badge=document.createElement("span"); badge.className="badge";
        badge.style.background=day.theme+"22"; badge.style.color=day.theme;
        badge.textContent=`${filled}/${seriesData.length}`; acts.appendChild(badge);
      }

      const btn=document.createElement("button"); btn.className="edit-btn";
      btn.style.background=isEditing?day.theme:"rgba(255,255,255,0.06)";
      btn.style.color=isEditing?"#fff":"#aaa";
      btn.innerHTML=isEditing
        ?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Salvar`
        :`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar`;
      btn.onclick=()=>{
        if(isEditing){ persist(); toast("✓ Salvo!"); }
        editing[ex.id]=!isEditing; renderContent(); renderTabs();
      };
      acts.appendChild(btn);
      head.appendChild(info); head.appendChild(acts); card.appendChild(head);

      // Series
      seriesData.forEach((s,i)=>{
        const row=document.createElement("div"); row.className="series-row";
        const lbl=document.createElement("span"); lbl.className="series-lbl";
        lbl.style.color=day.theme; lbl.textContent=`S${i+1}`;
        const fields=document.createElement("div"); fields.className="series-fields";

        ["peso","reps"].forEach(field=>{
          const wrap=document.createElement("div"); wrap.className="field-wrap";
          const fl=document.createElement("div"); fl.className="field-label";
          fl.textContent=field==="peso"?"Peso (kg)":"Reps feitas"; wrap.appendChild(fl);
          if(isEditing){
            const inp=document.createElement("input");
            inp.type="number"; inp.inputMode="decimal"; inp.min="0";
            inp.step=field==="peso"?"0.5":"1"; inp.placeholder="0";
            inp.value=s[field]; inp.className="field-input";
            inp.style.border=`1px solid ${day.theme}44`;
            inp.oninput=()=>{ data[activeDay][ex.id][i][field]=inp.value; };
            wrap.appendChild(inp);
          } else {
            const val=document.createElement("div");
            val.className="field-val"+(s[field]?"":" field-empty");
            val.textContent=s[field]?(field==="peso"?`${s[field]} kg`:`${s[field]} reps`):"—";
            wrap.appendChild(val);
          }
          fields.appendChild(wrap);
        });

        row.appendChild(lbl); row.appendChild(fields); card.appendChild(row);
      });

      block.appendChild(card);
    });

    el.appendChild(block);
  });
}

function render() { renderTabs(); renderContent(); }
render();

// Service Worker inline
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = "treino-v1";
    self.addEventListener("install", e => {
      e.waitUntil(caches.open(CACHE).then(c => c.add("/")));
      self.skipWaiting();
    });
    self.addEventListener("activate", e => {
      e.waitUntil(caches.keys().then(ks =>
        Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener("fetch", e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], {type:"text/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob), {scope:"/"}).catch(()=>{});
}
</script>
</body>
</html>
